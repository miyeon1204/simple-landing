<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이칸저칸 | 스마트한 지하철 커뮤니티</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #FF8C00; /* 메인 오렌지 */
            --primary-light: #FFF5EB;
            --dark: #1D1D1F;
            --grey: #86868B;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--dark);
            overflow-x: hidden;
            word-break: keep-all;
        }

        /* 포인트 애니메이션 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        /* Hero Section */
        .hero {
            padding: 180px 8% 100px;
            text-align: center;
            background: radial-gradient(circle at top right, #FFF5EB 0%, #FFFFFF 50%);
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -2px;
            animation: fadeInUp 0.8s ease;
        }

        .hero h1 span { color: var(--primary); }

        .hero p {
            font-size: 1.25rem;
            color: var(--grey);
            max-width: 600px;
            margin: 0 auto 40px;
            animation: fadeInUp 1s ease;
        }

        .cta-group {
            animation: fadeInUp 1.2s ease;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 18px 36px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.3);
        }

        /* Features Section */
        .section-label {
            text-align: center;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
            font-size: 1.1rem;
        }

        .features {
            padding: 100px 8%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 50px;
        }

        .card {
            background: #FBFBFD;
            padding: 48px;
            border-radius: 32px;
            transition: all 0.4s ease;
            border: 1px solid transparent;
